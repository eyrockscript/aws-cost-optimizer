name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-tf:
    name: Terraform Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"
      - name: Terraform fmt
        run: terraform fmt -recursive -check infra/
      - name: Terraform init
        run: terraform -chdir=infra init -backend=false
      - name: Terraform validate
        run: terraform -chdir=infra validate

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          soft_fail: true
          output_format: github_failed_only
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/package-lock.json
      - run: npm ci
        working-directory: services
      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: services

  lint-ts:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/package-lock.json
      - run: npm ci
        working-directory: services
      - run: npm run typecheck
        working-directory: services

  test-ts:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/package-lock.json
      - run: npm ci
        working-directory: services
      - run: npm run test:coverage
        working-directory: services
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: services/coverage/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
