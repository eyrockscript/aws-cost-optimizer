name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/package-lock.json

      - name: Install service dependencies
        run: npm ci
        working-directory: services

      - name: Bundle Lambda handlers
        run: npm run build
        working-directory: services

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: github-actions-deploy

      - name: Terraform init
        run: terraform -chdir=infra init
        env:
          TF_VAR_github_repo: ${{ github.repository }}

      - name: Terraform apply
        run: terraform -chdir=infra apply -auto-approve -var-file=infra/envs/dev.tfvars
        env:
          TF_VAR_github_repo: ${{ github.repository }}

      - name: Get API URL
        id: api-url
        run: |
          API_URL=$(terraform -chdir=infra output -raw api_url)
          echo "url=${API_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test — /summary
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-api-key: ${{ secrets.API_KEY }}" \
            "${{ steps.api-url.outputs.url }}/summary")
          echo "HTTP status: ${STATUS}"
          [ "${STATUS}" = "200" ] || exit 1

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.api-url.outputs.url }}
          VITE_API_KEY: ${{ secrets.API_KEY }}

      - name: Deploy frontend to S3 + CloudFront
        run: |
          BUCKET=$(terraform -chdir=infra output -raw frontend_bucket)
          DIST_ID=$(terraform -chdir=infra output -raw cloudfront_distribution_id)
          aws s3 sync frontend/dist/ "s3://${BUCKET}/" --delete
          aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*"
